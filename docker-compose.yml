services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - .env
      - .env.development
    environment:
      NODE_ENV: ${NODE_ENV}
      BACKEND_HOST: ${BACKEND_HOST}
      BACKEND_PORT: ${BACKEND_PORT}
      BACKEND_API_BASE_PATH: ${BACKEND_API_BASE_PATH}
      BACKEND_CORS_ORIGIN: ${BACKEND_CORS_ORIGIN}
      BACKEND_UPLOADS_DIR: ${BACKEND_UPLOADS_DIR}
      BACKEND_PUBLIC_DIR: ${BACKEND_PUBLIC_DIR}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"

  db:
    image: postgres:16-alpine
    network_mode: bridge
    container_name: postgres-db-development-ecommerce
    env_file:
      - .env
      - .env.development
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
  web-client:
    build:
      context: .
      dockerfile: apps/web-client/Dockerfile
    env_file:
      - .env
      - .env.development
    environment:
      NODE_ENV: ${NODE_ENV}
      WEB_CLIENT_HOST: 0.0.0.0
      WEB_CLIENT_PORT: ${WEB_CLIENT_PORT}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    ports:
      - "${WEB_CLIENT_PORT}:${WEB_CLIENT_PORT}"
    depends_on:
      - backend
    restart: unless-stopped

  web-admin:
    build:
      context: .
      dockerfile: apps/web-admin/Dockerfile
    env_file:
      - .env
      - .env.development
    environment:
      NODE_ENV: ${NODE_ENV}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "${WEB_ADMIN_PORT}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
